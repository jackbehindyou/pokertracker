<script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyDEFQfl3KOPUbwNM53sXQg5C83lisg7PyU",
  authDomain: "pokerstats-b9ed3.firebaseapp.com",
  projectId: "pokerstats-b9ed3",
  storageBucket: "pokerstats-b9ed3.firebasestorage.app",
  messagingSenderId: "904787779019",
  appId: "1:904787779019:web:9430e4c0155293febd2a4e",
  measurementId: "G-KRKB1G1CWE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── Helpers ──────────────────────────────────────────────────────────
const genCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
const genId   = () => Math.random().toString(36).substring(2, 14);
const fmt     = n => n === null || n === undefined ? "–" : (n >= 0 ? `+${Number(n).toFixed(2)}` : Number(n).toFixed(2)) + " CHF";
const fmtDate = iso => new Date(iso).toLocaleDateString("de-CH", { day:"2-digit", month:"2-digit", year:"numeric" });

// ── Theme ─────────────────────────────────────────────────────────────
let darkMode = localStorage.getItem("pk_dark") !== "false";
const T = () => darkMode ? {
  bg:"#0c0e13", surface:"#13161e", card:"#1a1e28", border:"#252b3a",
  accent:"#c9a84c", accentD:"#a07830", accentSoft:"#c9a84c18",
  text:"#e8e0d0", textMuted:"#5a6070", textSub:"#8a90a0",
  red:"#e05555", green:"#4caf7a", blue:"#5b8dee",
  shadow:"0 4px 24px #00000060"
} : {
  bg:"#f4efe6", surface:"#ede7dc", card:"#fdf7ee", border:"#d8ceC0",
  accent:"#8b6010", accentD:"#6a4a0c", accentSoft:"#8b601018",
  text:"#1a1208", textMuted:"#7a6f5a", textSub:"#5a5040",
  red:"#c0392b", green:"#1e7a45", blue:"#1d4ed8",
  shadow:"0 4px 24px #00000018"
};

// ── State ─────────────────────────────────────────────────────────────
let currentUser = null;
let currentSession = null;
let currentSessionId = null;
let unsubSession = null;
let allUsersCache = {};
let chartInstance = null;

// ── CSS ───────────────────────────────────────────────────────────────
function applyTheme() {
  const t = T();
  document.documentElement.style.setProperty("--bg", t.bg);
  document.documentElement.style.setProperty("--surface", t.surface);
  document.documentElement.style.setProperty("--card", t.card);
  document.documentElement.style.setProperty("--border", t.border);
  document.documentElement.style.setProperty("--accent", t.accent);
  document.documentElement.style.setProperty("--accent-d", t.accentD);
  document.documentElement.style.setProperty("--accent-soft", t.accentSoft);
  document.documentElement.style.setProperty("--text", t.text);
  document.documentElement.style.setProperty("--muted", t.textMuted);
  document.documentElement.style.setProperty("--sub", t.textSub);
  document.documentElement.style.setProperty("--red", t.red);
  document.documentElement.style.setProperty("--green", t.green);
  document.documentElement.style.setProperty("--blue", t.blue);
  document.documentElement.style.setProperty("--shadow", t.shadow);
}

// ── Auth ──────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) allUsersCache[user.uid] = snap.data();
    // Always go to lobby - user picks session themselves
    showLobby();
  } else {
    currentUser = null;
    currentSession = null;
    currentSessionId = null;
    showAuth();
  }
});

// ── Pages ─────────────────────────────────────────────────────────────
function showAuth() { render(authPage()); }
function showLobby() { render(lobbyPage()); }

async function enterSession(sessionId) {
  if (unsubSession) unsubSession();
  currentSessionId = sessionId;
  unsubSession = onSnapshot(doc(db, "sessions", sessionId), snap => {
    if (!snap.exists()) { currentSession = null; showLobby(); return; }
    currentSession = { id: snap.id, ...snap.data() };
    prefetchUsers(currentSession.players || []).then(() => {
      const tab = document.querySelector(".tab-btn.active")?.dataset?.tab || "uebersicht";
      renderSessionShell(tab);
    });
  });
}

async function prefetchUsers(uids) {
  const missing = uids.filter(uid => uid !== "__extern__" && !allUsersCache[uid]);
  await Promise.all(missing.map(async uid => {
    const snap = await getDoc(doc(db, "users", uid));
    if (snap.exists()) allUsersCache[uid] = snap.data();
  }));
}

function uname(uid) {
  if (uid === "__extern__") return "Weitere Spieler";
  return allUsersCache[uid]?.username || uid.substring(0,8);
}

// ── Render ────────────────────────────────────────────────────────────
function render(html) {
  document.getElementById("app").innerHTML = html;
  bindEvents();
}

function renderSessionShell(tab = "uebersicht") {
  const s = currentSession;
  const isAdmin = s.adminId === currentUser.uid;
  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <span class="logo-sm">🃏</span>
        <div>
          <span class="session-title">${esc(s.name)}</span>
          <span class="session-code">Code: <strong>${s.code}</strong></span>
        </div>
        ${isAdmin ? '<span class="badge">Admin</span>' : ""}
        ${!s.active ? '<span class="badge badge-red">Beendet</span>' : ""}
      </div>
      <div class="topbar-right">
        <span class="username-label">${esc(uname(currentUser.uid))}</span>
        <button class="btn btn-muted btn-sm" onclick="toggleDark()">🌙</button>
        <button class="btn btn-muted btn-sm" onclick="leaveSession()">← Zurück</button>
      </div>
    </div>
    <div class="tabs">
      ${[["uebersicht","📊 Übersicht"],["tabelle","📋 Tabelle"],["statistiken","🏆 Statistiken"]].map(([k,l]) =>
        `<button class="tab-btn${tab===k?" active":""}" data-tab="${k}" onclick="switchTab('${k}')">${l}</button>`
      ).join("")}
    </div>
    <div class="tab-content" id="tab-content">
      ${tab==="uebersicht" ? uebersichtHTML() : tab==="tabelle" ? tabelleHTML() : statistikenHTML()}
    </div>
  `;
  if (tab === "uebersicht") initChart();
  bindSessionEvents();
}

function switchTab(tab) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("tab-content").innerHTML =
    tab==="uebersicht" ? uebersichtHTML() : tab==="tabelle" ? tabelleHTML() : statistikenHTML();
  if (tab === "uebersicht") initChart();
  bindSessionEvents();
}
window.switchTab = switchTab;

// ── Auth Page ─────────────────────────────────────────────────────────
function authPage() {
  return `
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-icon">🃏</div>
        <h1 class="logo-text">PokerTracker</h1>
        <p class="logo-sub">Behalte den Überblick beim nächsten Spieleabend</p>
      </div>
      <div class="tab-switch">
        <button class="ts-btn active" id="ts-login" onclick="switchAuthTab('login')">Anmelden</button>
        <button class="ts-btn" id="ts-register" onclick="switchAuthTab('register')">Registrieren</button>
      </div>
      <div id="auth-form">
        ${authForm("login")}
      </div>
    </div>
  </div>`;
}

function authForm(mode) {
  return `
    ${mode==="register" ? `<div class="form-group"><label>Benutzername</label><input id="f-username" type="text" placeholder="dein_name" autocomplete="username" /></div>` : ""}
    <div class="form-group"><label>E-Mail</label><input id="f-email" type="email" placeholder="du@beispiel.ch" autocomplete="email" /></div>
    <div class="form-group"><label>Passwort</label><input id="f-password" type="password" placeholder="••••••" autocomplete="${mode==="login"?"current":"new"}-password" /></div>
    <div id="auth-error" class="alert alert-error" style="display:none"></div>
    <button class="btn btn-primary btn-full" onclick="doAuth('${mode}')">
      ${mode==="login" ? "Anmelden" : "Konto erstellen"}
    </button>
  `;
}

window.switchAuthTab = (mode) => {
  document.getElementById("ts-login").classList.toggle("active", mode==="login");
  document.getElementById("ts-register").classList.toggle("active", mode==="register");
  document.getElementById("auth-form").innerHTML = authForm(mode);
};

window.doAuth = async (mode) => {
  const username = document.getElementById("f-username")?.value.trim();
  const password = document.getElementById("f-password")?.value;
  const emailEl  = document.getElementById("f-email");
  const errEl    = document.getElementById("auth-error");
  errEl.style.display = "none";

  const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = "flex"; };

  if (!username || !password) return showErr("Bitte alle Felder ausfüllen.");

  if (mode === "register") {
    const email = emailEl?.value.trim();
    if (!email) return showErr("Bitte E-Mail angeben.");
    if (username.length < 3) return showErr("Benutzername min. 3 Zeichen.");
    if (password.length < 6) return showErr("Passwort min. 6 Zeichen.");
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: username });

      // Check if a ghost user with same username exists -> merge sessions
      const ghostQ = query(collection(db, "users"), where("username","==",username), where("ghost","==",true));
      const ghostSnap = await new Promise(res => onSnapshot(ghostQ, s => res(s), {once:true}));
      if (!ghostSnap.empty) {
        const ghostId = ghostSnap.docs[0].id;
        // Find all sessions containing the ghost user and replace ghost ID with real user ID
        const sessQ = query(collection(db, "sessions"), where("players","array-contains",ghostId));
        const sessSnap = await new Promise(res => onSnapshot(sessQ, s => res(s), {once:true}));
        for (const sessDoc of sessSnap.docs) {
          const sess = sessDoc.data();
          // Replace ghostId in players array
          const newPlayers = sess.players.map(p => p === ghostId ? cred.user.uid : p);
          // Replace ghostId in all game results
          const newGames = (sess.games||[]).map(g => {
            if (g.results && g.results[ghostId] !== undefined) {
              const newResults = { ...g.results };
              newResults[cred.user.uid] = newResults[ghostId];
              delete newResults[ghostId];
              return { ...g, results: newResults };
            }
            return g;
          });
          // Fix adminId if ghost was admin
          const newAdmin = sess.adminId === ghostId ? cred.user.uid : sess.adminId;
          await updateDoc(doc(db, "sessions", sessDoc.id), { players: newPlayers, games: newGames, adminId: newAdmin });
        }
        // Delete ghost user doc
        await deleteDoc(doc(db, "users", ghostId));
      }

      await setDoc(doc(db, "users", cred.user.uid), { uid: cred.user.uid, username, email, createdAt: new Date().toISOString() });
    } catch(e) {
      if (e.code === "auth/email-already-in-use") return showErr("E-Mail bereits registriert.");
      return showErr("Fehler: " + e.message);
    }
  } else {
    // Login with email
    const email = document.getElementById("f-email")?.value.trim() || "";
    if (!email) return showErr("Bitte E-Mail eingeben.");
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      return showErr("E-Mail oder Passwort falsch.");
    }
  }
};

async function loadMySessions() {
  const el = document.getElementById("my-sessions-section");
  if (!el) return;
  // Listen to sessions where user is a player
  const q = query(collection(db, "sessions"), where("players", "array-contains", currentUser.uid));
  onSnapshot(q, snap => {
    const sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!sessions.length) { el.innerHTML = ""; return; }
    el.innerHTML = `
      <h2 class="section-title">Meine Sessions</h2>
      ${sessions.map(s => `
        <div class="card session-row">
          <div class="session-row-info">
            <div class="session-row-name">
              ${esc(s.name)}
              ${s.adminId === currentUser.uid ? '<span class="badge">Admin</span>' : ""}
              ${!s.active ? '<span class="badge badge-red">Beendet</span>' : ""}
            </div>
            <div class="session-row-meta">Code: <strong>${s.code}</strong> · ${(s.players||[]).filter(p=>p!=="__extern__").length} Spieler · ${(s.games||[]).length} Spiele</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="enterSession('${s.id}')">Öffnen →</button>
        </div>
      `).join("")}
    `;
  });
}

// ── Session Actions ───────────────────────────────────────────────────
window.createSession = async () => {
  const name = document.getElementById("cs-name")?.value.trim();
  const errEl = document.getElementById("cs-error");
  if (!name) { errEl.textContent = "Bitte einen Namen eingeben."; errEl.style.display="flex"; return; }
  const id = genId();
  const code = genCode();
  await setDoc(doc(db, "sessions", id), {
    id, name, code, adminId: currentUser.uid, players: [currentUser.uid],
    games: [], createdAt: new Date().toISOString(), active: true
  });
  closeModal("create-session-modal");
  enterSession(id);
};

window.joinSession = async () => {
  const code = document.getElementById("jc-code")?.value.trim().toUpperCase();
  const errEl = document.getElementById("jc-error");
  if (!code) { errEl.textContent = "Bitte einen Code eingeben."; errEl.style.display="flex"; return; }
  const q2 = query(collection(db, "sessions"), where("code", "==", code), where("active", "==", true));
  const snap = await new Promise(res => onSnapshot(q2, s => res(s), { once: true }));
  if (snap.empty) { errEl.textContent = "Ungültiger Code oder Session nicht aktiv."; errEl.style.display="flex"; return; }
  const sessDoc = snap.docs[0];
  const sess = sessDoc.data();
  if ((sess.players||[]).includes(currentUser.uid)) {
    // Already in session - just open it
    closeModal("join-session-modal");
    enterSession(sessDoc.id);
    return;
  }
  await updateDoc(doc(db, "sessions", sessDoc.id), { players: arrayUnion(currentUser.uid) });
  closeModal("join-session-modal");
  enterSession(sessDoc.id);
};

window.leaveSession = () => {
  if (unsubSession) { unsubSession(); unsubSession = null; }
  currentSession = null; currentSessionId = null;
  showLobby();
};

window.doLogout = async () => {
  if (unsubSession) { unsubSession(); unsubSession = null; }
  await signOut(auth);
};

// ── Übersicht ─────────────────────────────────────────────────────────
function uebersichtHTML() {
  const s = currentSession;
  const isAdmin = s.adminId === currentUser.uid;
  const playerIds = (s.players||[]).filter(p => p !== "__extern__");

  // Leaderboard
  const leaderboard = playerIds.map(pid => ({
    id: pid, name: uname(pid),
    total: (s.games||[]).reduce((acc, g) => {
      const v = g.results?.[pid]; return v !== null && v !== undefined ? acc + Number(v) : acc;
    }, 0)
  })).sort((a,b) => b.total - a.total);

  return `
    ${isAdmin && s.active ? `
    <div class="card admin-bar">
      <div>
        <div class="admin-bar-title">Admin-Steuerung</div>
        <div class="admin-bar-sub">Session-Code: <strong class="code-pill">${s.code}</strong> – teile diesen Code mit Freunden</div>
      </div>
      <div class="admin-bar-actions">
        <button class="btn btn-primary btn-sm" onclick="addGame()">➕ Neues Spiel</button>
        <button class="btn btn-danger btn-sm" onclick="showModal('end-session-modal')">Session beenden</button>
      </div>
    </div>` : ""}

    ${!s.active && isAdmin ? `
    <div class="card" style="margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div style="flex:1;color:var(--muted)">Session ist beendet.</div>
      <button class="btn btn-muted btn-sm" onclick="exportCSV()">📥 CSV exportieren</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSession()">Session löschen</button>
    </div>` : ""}

    <div class="overview-grid">
      <div class="card">
        <h3 class="card-title">🏆 Leaderboard</h3>
        <div class="leaderboard">
          ${leaderboard.map((p,i) => `
            <div class="lb-row ${i===0?"lb-first":""}">
              <span class="lb-rank">${["🥇","🥈","🥉"][i]||`${i+1}.`}</span>
              <span class="lb-name">${esc(p.name)}</span>
              <span class="lb-val ${p.total>=0?"val-pos":"val-neg"}">${fmt(p.total)}</span>
            </div>
          `).join("")}
          ${leaderboard.length===0?"<p style='color:var(--muted);text-align:center;padding:20px'>Noch keine Spieler</p>":""}
        </div>
      </div>
      <div class="card">
        <h3 class="card-title">📈 Verlauf (kumulativ)</h3>
        ${(s.games||[]).length === 0
          ? `<div class="empty-state">Noch keine Spiele vorhanden.</div>`
          : `<div style="position:relative;height:250px"><canvas id="chart-canvas"></canvas></div>`
        }
      </div>
    </div>

    ${(s.games||[]).length > 0 ? `
    <div class="card" style="margin-top:16px">
      <h3 class="card-title">Letzte Spiele</h3>
      ${[...(s.games||[])].reverse().slice(0,5).map((g,i) => {
        const allP = [...playerIds, ...(s.players.includes("__extern__")?["__extern__"]:[])];
        const sum = allP.reduce((acc,pid) => { const v=g.results?.[pid]; return v!==null&&v!==undefined?acc+Number(v):acc; }, 0);
        const filled = Object.keys(g.results||{}).filter(k => g.results[k]!==null&&g.results[k]!==undefined).length;
        return `
        <div class="recent-row">
          <span class="recent-date">${fmtDate(g.date)}</span>
          <span class="recent-info">${filled} Einträge</span>
          ${Math.abs(sum)>0.01 ? `<span class="badge badge-red">Differenz: ${sum.toFixed(2)} CHF</span>` : '<span class="badge badge-green">✓ Ausgeglichen</span>'}
        </div>`;
      }).join("")}
    </div>` : ""}

    <!-- End Session Modal -->
    <div class="modal-overlay" id="end-session-modal" style="display:none">
      <div class="modal">
        <div class="modal-header"><h2>Session beenden</h2><button onclick="closeModal('end-session-modal')">✕</button></div>
        <p style="color:var(--sub);margin-bottom:8px">Die Daten werden als CSV exportiert, bevor die Session beendet wird.</p>
        <p style="color:var(--red);font-size:13px;margin-bottom:20px">⚠️ Beendete Sessions können nicht wieder geöffnet werden.</p>
        <div class="modal-actions">
          <button class="btn btn-muted" onclick="closeModal('end-session-modal')">Abbrechen</button>
          <button class="btn btn-danger" onclick="endSession()">Beenden & exportieren</button>
        </div>
      </div>
    </div>
  `;
}

function initChart() {
  const s = currentSession;
  const canvas = document.getElementById("chart-canvas");
  if (!canvas || !s) return;
  const playerIds = (s.players||[]).filter(p => p !== "__extern__");
  const COLORS = ["#c9a84c","#5b8dee","#4caf7a","#e05555","#a78bfa","#fb923c","#22d3ee","#f472b6"];

  const labels = (s.games||[]).map((_,i) => `S${i+1}`);
  const datasets = playerIds.map((pid, i) => {
    let cum = 0;
    const data = (s.games||[]).map(g => {
      const v = g.results?.[pid];
      if (v !== null && v !== undefined) cum += Number(v);
      return cum;
    });
    return { label: uname(pid), data, borderColor: COLORS[i % COLORS.length], backgroundColor: COLORS[i%COLORS.length]+"22", borderWidth: 2, pointRadius: 3, tension: 0.3, fill: false };
  });

  const t = T();
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: t.textSub, font: { family: "DM Sans" } } }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw >= 0 ? "+" : ""}${Number(ctx.raw).toFixed(2)} CHF` } } },
      scales: {
        x: { ticks: { color: t.textMuted }, grid: { color: t.border } },
        y: { ticks: { color: t.textMuted, callback: v => `${v} CHF` }, grid: { color: t.border } }
      }
    }
  });
}

// ── Tabelle ───────────────────────────────────────────────────────────
function tabelleHTML() {
  const s = currentSession;
  const isAdmin = s.adminId === currentUser.uid;
  const playerIds = (s.players||[]).filter(p => p !== "__extern__");
  const allPids = [...playerIds, ...(s.players.includes("__extern__") ? ["__extern__"] : [])];

  const totals = {};
  allPids.forEach(pid => {
    totals[pid] = (s.games||[]).reduce((acc,g) => { const v=g.results?.[pid]; return v!==null&&v!==undefined?acc+Number(v):acc; }, 0);
  });

  if (!s.games?.length) return `<div class="card"><div class="empty-state">${isAdmin ? "Erstelle ein neues Spiel über die Übersichtsseite." : "Der Admin hat noch kein Spiel gestartet."}</div></div>`;

  return `
  <div id="table-error"></div>
  <div class="card table-card">
    <div class="table-scroll">
      <table class="results-table">
        <thead>
          <tr>
            <th class="th-spiel">Spiel</th>
            <th class="th-datum">Datum</th>
            ${allPids.map(pid => `<th>${pid==="__extern__"?'<span class="muted-label">Weitere</span>':esc(uname(pid))}${pid===currentUser.uid?'<span class="badge-me">Ich</span>':""}</th>`).join("")}
            <th>Summe</th>
          </tr>
        </thead>
        <tbody>
          ${(s.games||[]).map((g,gi) => {
            const sum = allPids.reduce((acc,pid)=>{ const v=g.results?.[pid]; return v!==null&&v!==undefined?acc+Number(v):acc; },0);
            const hasErr = Math.abs(sum) > 0.01;
            return `
            <tr class="${hasErr?"row-err":""}">
              <td class="td-spiel">Spiel ${gi+1}</td>
              <td class="td-date">${fmtDate(g.date)}</td>
              ${allPids.map(pid => {
                const val = g.results?.[pid];
                const editable = s.active && pid !== "__extern__" && (isAdmin || pid === currentUser.uid);
                const display = val===null||val===undefined ? '<span class="val-none">–</span>'
                  : `<span class="${Number(val)>=0?"val-pos":"val-neg"}">${Number(val)>=0?"+":""}${Number(val).toFixed(2)}</span>`;
                return `<td><div class="cell-wrap ${editable?"cell-editable":""}" onclick="${editable?`startEdit('${g.id}','${pid}',${val===null||val===undefined?"null":val})`:""}">
                  <span id="cell-${g.id}-${pid}">${display}</span>

              }).join("")}
              <td class="td-sum">
                ${hasErr

            </tr>`;
          }).join("")}
        </tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="2">TOTAL</td>
            ${allPids.map(pid => `<td class="${totals[pid]>=0?"val-pos":"val-neg"} fw-bold">${totals[pid]>=0?"+":""}${totals[pid].toFixed(2)} CHF</td>`).join("")}

      </table>

let editState = null;
window.startEdit = (gameId, playerId, currentVal) => {
  editState = { gameId, playerId };
  const lbl = document.getElementById("edit-modal-label");
  if (lbl) lbl.textContent = `Spieler: ${uname(playerId)}`;
  const inp = document.getElementById("edit-val");
  if (inp) inp.value = currentVal !== null ? currentVal : "";
  showModal("edit-modal");
  setTimeout(() => inp?.focus(), 100);
};

window.saveEdit = async () => {
  if (!editState) return;
  const inp = document.getElementById("edit-val");
  const errEl = document.getElementById("edit-error");
  const v = parseFloat(inp.value.replace(",","."));
  if (isNaN(v)) { errEl.textContent = "Bitte eine gültige Zahl eingeben."; errEl.style.display="flex"; return; }
  await commitResult(editState.gameId, editState.playerId, v);
  closeModal("edit-modal");
  editState = null;
};

window.saveNotPlayed = async () => {
  if (!editState) return;
  await commitResult(editState.gameId, editState.playerId, null);
  closeModal("edit-modal");
  editState = null;
};

async function commitResult(gameId, playerId, value) {
  const s = currentSession;
  const games = (s.games||[]).map(g => {
    if (g.id !== gameId) return g;
    const results = { ...(g.results||{}), [playerId]: value };
    return { ...g, results };
  });
  await updateDoc(doc(db, "sessions", s.id), { games });

  // Check sum for admin
  const updatedGame = games.find(g => g.id === gameId);
  const allPids = [...(s.players||[]).filter(p=>p!=="__extern__"), ...(s.players.includes("__extern__")?["__extern__"]:[])];
  const sum = allPids.reduce((acc,pid) => { const v=updatedGame.results?.[pid]; return v!==null&&v!==undefined?acc+Number(v):acc; }, 0);
  if (s.adminId === currentUser.uid && Math.abs(sum) > 0.01) {
    const errEl = document.getElementById("table-error");
    if (errEl) {
      errEl.innerHTML = `<div class="alert alert-error" style="margin-bottom:14px">⚠️ Spiel vom ${fmtDate(updatedGame.date)}: Summe ergibt ${sum.toFixed(2)} CHF (sollte 0 sein). Bitte korrigieren oder Differenz extern zuweisen.</div>`;
      setTimeout(() => { if (errEl) errEl.innerHTML = ""; }, 8000);
    }
  }
}

window.assignExtern = async (gameId, sum) => {
  const s = currentSession;
  const games = (s.games||[]).map(g => {
    if (g.id !== gameId) return g;
    return { ...g, results: { ...(g.results||{}), "__extern__": -sum } };
  });
  const players = s.players.includes("__extern__") ? s.players : [...s.players, "__extern__"];
  await updateDoc(doc(db, "sessions", s.id), { games, players });
};

// ── Statistiken ───────────────────────────────────────────────────────
function statistikenHTML() {
  const s = currentSession;
  const playerIds = (s.players||[]).filter(p => p !== "__extern__");

  const stats = playerIds.map(pid => {
    const participated = (s.games||[]).filter(g => g.results?.[pid] !== null && g.results?.[pid] !== undefined);
    const wins = participated.filter(g => Number(g.results[pid]) > 0);
    const losses = participated.filter(g => Number(g.results[pid]) < 0);
    const total = participated.reduce((acc,g) => acc + Number(g.results[pid]), 0);
    const best = participated.length ? Math.max(...participated.map(g => Number(g.results[pid]))) : 0;
    const worst = participated.length ? Math.min(...participated.map(g => Number(g.results[pid]))) : 0;
    const avg = participated.length ? total / participated.length : 0;
    let streak = 0, maxStreak = 0;
    participated.forEach(g => { if (Number(g.results[pid])>0){streak++;maxStreak=Math.max(maxStreak,streak);}else streak=0; });
    return { id:pid, name:uname(pid), total, wins:wins.length, losses:losses.length, gamesPlayed:participated.length, winRate:participated.length?Math.round(wins.length/participated.length*100):0, best, worst, avg, maxStreak };
  }).sort((a,b) => b.total - a.total);

  if (!stats.length) return `<div class="card"><div class="empty-state">Noch keine Statistiken verfügbar.</div></div>`;

  return `
  <div class="stats-grid">
    ${stats.map((st,i) => `
    <div class="card stats-card">
      <div class="stats-header">
        <span class="stats-rank">${["🥇","🥈","🥉"][i]||"🃏"}</span>
        <div>
          <div class="stats-name">${esc(st.name)}</div>
          <div class="stats-total ${st.total>=0?"val-pos":"val-neg"}">${fmt(st.total)}</div>
        </div>
      </div>
      <div class="stats-grid2">
        ${[["🎮 Spiele",st.gamesPlayed],["🏆 Siege",st.wins],["💔 Niederlagen",st.losses],["📊 Siegquote",`${st.winRate}%`],
           ["📈 Bestes Spiel",`${st.best>=0?"+":""}${st.best.toFixed(2)} CHF`],["📉 Schlechtestes",`${st.worst.toFixed(2)} CHF`],
           ["⌀ Ø pro Spiel",`${st.avg>=0?"+":""}${st.avg.toFixed(2)} CHF`],["🔥 Längste Serie",`${st.maxStreak} Siege`]
          ].map(([l,v]) => `<div class="stat-box"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join("")}
      </div>
    </div>`).join("")}
  </div>`;
}

// ── CSV Export / Import ───────────────────────────────────────────────
window.exportCSV = () => {
  const s = currentSession;
  if (!s) return;
  const playerIds = (s.players||[]).filter(p => p !== "__extern__");
  if (s.players.includes("__extern__")) playerIds.push("__extern__");
  const names = playerIds.map(uname);
  let csv = "Spiel;Datum;" + names.join(";") + "\n";
  (s.games||[]).forEach((g,i) => {
    const row = [`Spiel ${i+1}`, fmtDate(g.date)];
    playerIds.forEach(pid => { const v=g.results?.[pid]; row.push(v===null||v===undefined?"–":v); });
    csv += row.join(";") + "\n";
  });
  const tots = ["Total",""];
  playerIds.forEach(pid => { tots.push((s.games||[]).reduce((acc,g)=>{ const v=g.results?.[pid]; return v!==null&&v!==undefined?acc+Number(v):acc; },0).toFixed(2)); });
  csv += tots.join(";");
  const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=`poker_${s.name.replace(/\s/g,"_")}.csv`; a.click();
  URL.revokeObjectURL(url);
};

window.downloadTemplate = () => {
  const csv = "Datum;Spieler1;Spieler2;Spieler3\n01.01.2024;10;-5;-5\n15.01.2024;-20;15;5";
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="poker_import_template.csv"; a.click();
  URL.revokeObjectURL(url);
};

let importData = null;
window.previewImport = () => {
  const f = document.getElementById("imp-file")?.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result.replace(/^\uFEFF/,"").replace(/\r/g,"");
      const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
      if (lines.length < 2) {
        document.getElementById("imp-preview").innerHTML = `<p style="color:var(--red);font-size:13px;margin-top:8px">⚠️ Datei hat zu wenig Zeilen.</p>`;
        return;
      }
      // Auto-detect separator
      const sep = lines[0].includes(";") ? ";" : ",";
      const headers = lines[0].split(sep).map(h => h.trim());
      const playerNames = headers.slice(1).filter(Boolean);
      const games = lines.slice(1).map(line => {
        const cols = line.split(sep).map(c => c.trim());
        const results = {};
        playerNames.forEach((p,j) => {
          const raw = cols[j+1]?.replace(",",".");
          const v = parseFloat(raw);
          results[p] = isNaN(v) ? null : v;
        });
        return { date: cols[0], results };
      }).filter(g => Object.keys(g.results).length > 0);

      importData = { playerNames, games };
      document.getElementById("imp-preview").innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px">
          <p style="color:var(--green);font-size:13px;font-weight:700;margin-bottom:8px">✅ ${games.length} Spiele und ${playerNames.length} Spieler erkannt</p>
          <p style="color:var(--sub);font-size:12px;margin-bottom:4px">Spieler: ${playerNames.map(p=>`<strong>${esc(p)}</strong>`).join(", ")}</p>
          <p style="color:var(--muted);font-size:11px;margin-top:6px">Erstes Spiel: ${games[0]?.date || "–"} · Letztes: ${games[games.length-1]?.date || "–"}</p>
        </div>
      `;
    } catch(e) {
      document.getElementById("imp-preview").innerHTML = `<p style="color:var(--red);font-size:13px;margin-top:8px">⚠️ Fehler beim Lesen der Datei: ${e.message}</p>`;
    }
  };
  reader.readAsText(f, "UTF-8");
};

window.doImport = async () => {
  const name = document.getElementById("imp-name")?.value.trim();
  const errEl = document.getElementById("imp-error");
  errEl.style.display = "none";
  if (!name) { errEl.textContent="Bitte Session-Name eingeben."; errEl.style.display="flex"; return; }
  if (!importData) { errEl.textContent="Bitte zuerst eine Datei hochladen."; errEl.style.display="flex"; return; }
  if (importData.games.length === 0) { errEl.textContent="Keine Spiele in der Datei gefunden."; errEl.style.display="flex"; return; }

  // Show loading state
  const btn = document.querySelector("#import-modal .btn-primary");
  if (btn) { btn.textContent = "Wird importiert..."; btn.disabled = true; }

  try {
    // For each player name: check if a real or ghost user with that name exists
    const playerIds = await Promise.all(importData.playerNames.map(async pname => {
      const trimmed = pname.trim();
      if (!trimmed) return null;
      // Use getDocs-style via getDoc workaround: query then get first result
      const q2 = query(collection(db, "users"), where("username","==",trimmed));
      const snap = await new Promise((res, rej) => {
        const unsub = onSnapshot(q2, s => { unsub(); res(s); }, rej);
      });
      if (!snap.empty) {
        allUsersCache[snap.docs[0].id] = snap.docs[0].data();
        return snap.docs[0].id;
      }
      // Create ghost user
      const id = genId();
      await setDoc(doc(db,"users",id), { uid:id, username:trimmed, ghost:true, createdAt:new Date().toISOString() });
      allUsersCache[id] = { username: trimmed };
      return id;
    }));

    const validPlayerIds = playerIds.filter(Boolean);
    const sessId = genId();
    const sessionName = name;

    const games = importData.games.map(g => {
      const results = {};
      importData.playerNames.forEach((pname, i) => {
        if (playerIds[i]) results[playerIds[i]] = g.results[pname.trim()];
      });
      // Try to parse date from CSV, fallback to now
      let dateStr = new Date().toISOString();
      if (g.date) {
        const parts = g.date.split(".");
        if (parts.length === 3) {
          const parsed = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
          if (!isNaN(parsed)) dateStr = parsed.toISOString();
        }
      }
      return { id:genId(), date:dateStr, results };
    });

    // Ensure current user is in players list
    const allPlayers = [currentUser.uid, ...validPlayerIds.filter(id => id !== currentUser.uid)];

    await setDoc(doc(db,"sessions",sessId), {
      id:sessId, name:sessionName, code:genCode(), adminId:currentUser.uid,
      players:allPlayers, games, createdAt:new Date().toISOString(), active:true
    });

    importData = null;
    closeModal("import-modal");
    enterSession(sessId);
  } catch(e) {
    errEl.textContent = "Fehler beim Import: " + e.message;
    errEl.style.display = "flex";
    if (btn) { btn.textContent = "Importieren"; btn.disabled = false; }
  }
};

// ── Utils ─────────────────────────────────────────────────────────────
function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  document.getElementById("edit-val")?.addEventListener("keydown", e => { if (e.key==="Enter") saveEdit(); });
}
